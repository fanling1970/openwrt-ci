# =========================================================
# Workflow 名称（显示在 GitHub Actions 页面）
# =========================================================
name: IPQ60XX-6.12-WIFI

# =========================================================
# 触发条件
# =========================================================
on:
  workflow_dispatch:      # 允许手动点击运行
  schedule:
    - cron: '0 19 * * *'  # 每天 UTC 19:00 自动编译（北京时间 03:00）

# =========================================================
# 全局环境变量
# =========================================================
env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git  # OpenWrt 源码地址
  REPO_BRANCH: main-nss                                # 使用带 NSS 的分支
  CONFIG_FILE: configs/ipq60xx-6.12-wifi.config         # 你的配置文件路径
  CACHE_TOOLCHAIN: true                                 # 是否缓存工具链（加速编译）
  UPLOAD_BIN_DIR: false                                 # 是否上传 bin 目录（一般不用）
  FIRMWARE_RELEASE: true                                # 是否发布到 Release
  FIRMWARE_TAG: IPQ60XX-6.12-WIFI                       # Release 标签名
  TZ: Asia/Shanghai                                     # 时区设置

# =========================================================
# Jobs 定义
# =========================================================
jobs:
  Build:
    runs-on: ubuntu-22.04          # 使用 Ubuntu 22.04（更稳定）
    timeout-minutes: 360           # 最大运行 6 小时

    steps:
      # =====================================================
      # 1. 检出当前仓库（包含 config 和 workflow）
      # =====================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =====================================================
      # 2. 释放磁盘空间（IPQ60XX + NSS 非常占空间）
      # =====================================================
      - name: Free Disk Space
        run: |
          echo "清理 Docker 镜像和无用软件包"
          docker rmi $(docker images -q) >/dev/null 2>&1 || true
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/lib/android

      # =====================================================
      # 3. 初始化编译环境
      # =====================================================
      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget dos2unix libfuse-dev
          sudo timedatectl set-timezone "$TZ"

      # =====================================================
      # 4. 扩容 Runner 磁盘（非常关键）
      # =====================================================
      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024        # 交换分区大小
          temp-reserve-mb: 100      # 临时文件保留空间
          root-reserve-mb: 2048     # 根分区保留空间

      # =====================================================
      # 5. 克隆 OpenWrt 源码
      # =====================================================
      - name: Clone Source Code
        run: |
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      # =====================================================
      # 6. 添加 iStore / NAS 软件源
      # =====================================================
      - name: Add iStore Feeds
        run: |
          cd openwrt
          echo "src-git istore https://github.com/linkease/istore" >> feeds.conf.default
          echo "src-git nas_luci https://github.com/linkease/nas-packages-luci" >> feeds.conf.default

      # =====================================================
      # 7. 载入你的 .config 配置
      # =====================================================
      - name: Load Config
        run: |
          cp $CONFIG_FILE $OPENWRT_PATH/.config
          cd $OPENWRT_PATH
          make defconfig

      # =====================================================
      # 8. 缓存工具链（极大加快二次编译）
      # =====================================================
      - name: Cache Toolchain
        if: env.CACHE_TOOLCHAIN == 'true'
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: false
          mixkey: ${{ github.job }}-${{ github.sha }}
          prefix: ${{ env.OPENWRT_PATH }}

      # =====================================================
      # 9. 更新并安装 Feeds
      # =====================================================
      - name: Update & Install Feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # =====================================================
      # 10. 下载 DL 包（源码依赖）
      # =====================================================
      - name: Download DL Packages
        run: |
          cd $OPENWRT_PATH
          make download -j$(nproc)
          find dl -size -1024c -delete

      # =====================================================
      # 11. 开始编译固件
      # =====================================================
      - name: Compile Firmware
        id: compile
        run: |
          cd $OPENWRT_PATH
          make -j$(nproc) V=s || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      # =====================================================
      # 12. 整理固件文件（删除无用文件）
      # =====================================================
      - name: Organize Firmware
        if: steps.compile.outputs.status == 'success'
        run: |
          cd $OPENWRT_PATH/bin/targets/*/*
          rm -rf *.buildinfo *.json sha256sums
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

      # =====================================================
      # 13. 发布到 GitHub Release
      # =====================================================
      - name: Upload Firmware to Release
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.FIRMWARE_TAG }}
          tag: ${{ env.FIRMWARE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.FIRMWARE_PATH }}/*
          allowUpdates: true
